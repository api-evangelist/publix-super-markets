name: Publix Super Markets
description: >-
  Publix Super Markets is one of the largest employee-owned supermarket chains
  in the United States, headquartered in Lakeland, Florida. It operates grocery
  stores, pharmacies, delivery, catering, and online ordering services across
  the southeastern United States. Publix is a Fortune 500 company. No public
  developer APIs or developer portal have been identified at this time.
